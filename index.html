<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZyphAbyssX | Free Fire</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', sans-serif;
}

body {
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  height: 100vh;
  overflow: hidden;
}

.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.card {
  background: rgba(15, 23, 42, 0.75);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(56, 189, 248, 0.25);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

h1 {
  font-size: 3rem;
  background: linear-gradient(90deg,#38bdf8,#a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 25px rgba(168,85,247,0.7);
}

.tagline {
  margin: 15px 0;
  font-size: 1.1rem;
  opacity: 0.85;
}

.btn {
  margin-top: 25px;
  display: inline-block;
  padding: 12px 30px;
  border-radius: 30px;
  background: linear-gradient(90deg,#38bdf8,#a855f7);
  color: white;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(56,189,248,0.6);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 40px rgba(168,85,247,0.9);
}

.footer {
  position: absolute;
  bottom: 15px;
  width: 100%;
  text-align: center;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>ZyphAbyssX</h1>
    <p class="tagline">Free Fire Pro Gaming | One Tap • Headshot</p>

    <a class="btn" href="https://youtube.com/@zyphabyssx" target="_blank">
      Visit YouTube Channel
    </a>
  </div>
</div>

<div class="footer">
  © 2026 ZyphAbyssX | Free Fire Gaming
</div>

</body>
</html>
